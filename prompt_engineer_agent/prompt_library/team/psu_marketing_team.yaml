## KPI追蹤

| 指標 | 目標 | 測量方式 |
|-----|------|---------|
| 開發信回覆率 | ≥5% | 回覆數/發送數 |
| 樣品訂單轉化率 | ≥30% | 樣品→正式訂單 |
| 報價→成交率 | ≥20% | 成交數/報價數 |
| 客戶終身價值 | 首次×5 | 複購金額 |
