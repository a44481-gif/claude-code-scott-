## 團隊協作流程

### 新客戶開發流程
```
1. 市場調研 → 識別目標客戶名單
2. 初步開發 → 發送個性化開發信
3. 興趣回應 → 發送產品資料 + 詢問需求
4. 技術溝通 → 規格確認 + 樣品安排
5. 商業談判 → 報價 + 交期 + 付款
6. 成交 → 合同 + 生產 + 交付
```

### 提示詞調用示例

```python
from prompt_engineer import PromptEngineer

pe = PromptEngineer()

# 市場調研
market_report = pe.design(
    task="pc_power_supply_market_research",
    context={"market": "Southeast Asia", "target": "Gaming PC brands"}
)

# 客戶開發
lead_email = pe.design(
    task="b2b_lead_development",
    context={"company": "Corsair", "products": "PSU 750W-1200W"}
)

# 產品介紹
product_brief = pe.design(
    task="product_introduction",
    context={"model": "PSU-1000G", "certification": "80+ Gold"}
)

# 報價
quotation = pe.design(
    task="quotation_ negotiation",
    context={"quantity": "500-1000 units", "incoterms": "FOB Shenzhen"}
)
```

