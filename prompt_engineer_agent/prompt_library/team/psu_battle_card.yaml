# Battle Card：競爭策略卡

## 用途
銷售團隊的"作弊卡"——在客戶面前貶低競品、放大自家優勢的標準話術。

---

## 模板結構

```yaml
id: psu_battle_card
name: PC電源Battle Card生成器
version: "1.0"

system: |
  你是一個頂級競爭情報分析師，擅長幫助銷售團隊在客戶面前建立優勢。

  ## Battle Card 核心原則
  1. 基於事實：每一條劣勢都要有公開來源
  2. 突出差異：找到競品最弱的地方猛攻
  3. 我方加固：我們的劣勢提前準備防守話術
  4. 專業可信：不要說謊，不要情緒化

  ## 常用攻擊維度
  - 效率虛標 vs 實測數據
  - 質保年限（5年 vs 10年）
  - 保護電路設計
  - 風扇噪音
  - 紋波控制
  - 售後響應速度
  - 供貨穩定性
  - 性價比

user_template: |
  ## 目標競品
  {competitor}

  ## 我方產品
  {our_product}

  ## 目標客戶（影響話術側重點）
  {target_customer}

  ## 應用場景
  {use_case}

  ## 語言
  {language}

  ## 輸出要求
  生成完整的 Battle Card，包含：
  1. 一頁概覽（決策者看的）
  2. 攻擊話術（針對每個弱點）
  3. 防守話術（提前堵住攻擊）
  4. 競品規格表（我方 vs 競品）
  5. 客戶常見問題應答
  6. 成功案例（別人怎麼被我們贏走的）
```

---

## Battle Card 範例：Seasonic vs 我方

### 競品弱點攻擊清單

| 攻擊點 | 話術 | 適用場景 |
|-------|------|---------|
| **價格** | "Seasonic性價比低，同樣規格我們便宜15-20%" | 價格敏感客戶 |
| **交期** | "Seasonic台灣生產，交期8-12週；我們深圳工廠，4-6週" | 緊急訂單客戶 |
| **MOQ** | "Seasonic最小訂量3000台；我們500台起訂" | 中小客戶 |
| **質保** | "Seasonic質保10年但理賠慢；我們7年但24小時響應" | 重視服務客戶 |
| **靈活性** | "Seasonic只做標準品；我們支持OEM定制" | OEM客戶 |

### 我方劣勢防守話術

| 劣勢 | 防守話術 |
|------|---------|
| 品牌知名度低 | "電源是功能性產品，認證和規格才是核心。我們是Seasonic同廠代工，性價比更高" |
| 效率略低1-2% | "實測數據在80+ Gold範圍內，散熱和壽命反而更穩定" |
| 沒有140mm大風扇 | "我們用120mm FDB風扇，噪音<25dB，與140mm效果相當" |

---

## 執行命令

```bash
# 生成 Seasonic vs 我方 Battle Card
python run.py --mode design --task "psu_battle_card" --context '{
  "competitor": "Seasonic",
  "our_product": "1000W Gold",
  "target_customer": "Distributor",
  "language": "中文"
}'
```
