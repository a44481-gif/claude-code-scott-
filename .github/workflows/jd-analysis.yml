name: JD Market Analysis Automation

on:
  # 每天 03:00 和 15:00 (北京时间) 运行
  schedule:
    - cron: '0 3 * * *'   # 03:00 北京时间
    - cron: '0 15 * * *'  # 15:00 北京时间
  # 也可手动触发
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas openpyxl lxml

      # 4. 运行爬虫
      - name: Run JD Crawler
        run: |
          python .claude/jd_crawler.py --force-mock
        env:
          PYTHONIOENCODING: utf-8

      # 5. 运行分析师（含邮件发送）
      - name: Run JD Analyst
        run: |
          python .claude/jd_analyst.py
        env:
          PYTHONIOENCODING: utf-8
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        continue-on-error: true

      # 6. 提交结果到 GitHub
      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: JD analysis $(date +'%Y-%m-%d %H:%M')"
          git push || echo "Push skipped (no changes)"
        continue-on-error: true

      # 7. 上传分析报告作为 artifact
      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jd-analysis-report-${{ github.run_number }}
          path: |
            .claude/jd_analysis_report.xlsx
            .claude/jd_analysis_summary.txt
            .claude/jd_gaming_laptops_raw.json
          retention-days: 7
