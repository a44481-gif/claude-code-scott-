name: AI 短视频运营 - 每日内容生成

on:
  schedule:
    # 每天早上 9:00 (北京时间)
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  daily-content:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install edge-tts pandas requests

      - name: 生成每日内容
        id: generate
        run: |
          python src/content/daily_content_generator.py

      - name: 保存最新内容
        run: |
          # 保存生成的内容到文件
          echo "生成日期：$(date +'%Y-%m-%d %H:%M:%S')" > output/latest_content.txt
          echo "状态：成功" >> output/latest_content.txt

      - name: 发送飞书通知
        if: success()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python scripts/feishu_notify.py "AI 短视频运营 - $(date +'%Y-%m-%d')" "每日内容已自动生成，请查收邮件获取详情"

      - name: 发送邮件报告
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python -c "
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from datetime import datetime

          smtp_server = 'smtp.163.com'
          smtp_port = 25
          sender_email = 'h13751019800@163.com'
          password = '${{ secrets.EMAIL_PASSWORD }}'
          recipient_email = 'scott365888@gmail.com'

          html = '''
          <html><body>
          <h2>AI 短视频运营报告</h2>
          <p><strong>日期：</strong>''' + datetime.now().strftime('%Y-%m-%d') + '''</p>
          <p><strong>时间：</strong>''' + datetime.now().strftime('%H:%M:%S') + '''</p>
          <hr>
          <h3>状态：✅ 每日内容已生成</h3>
          <p>云端自动化运行成功</p>
          <hr>
          <p><strong>联系：</strong>Scott | scott365888@gmail.com | 微信: PTS9800</p>
          </body></html>
          '''

          msg = MIMEMultipart('alternative')
          msg['Subject'] = 'AI 短视频运营报告 - ' + datetime.now().strftime('%Y-%m-%d')
          msg['From'] = f'AI运营系统 <{sender_email}>'
          msg['To'] = recipient_email
          msg.attach(MIMEText(html, 'html', 'utf-8'))

          with smtplib.SMTP(smtp_server, smtp_port) as server:
              server.starttls()
              server.login(sender_email, password)
              server.send_message(msg)
          print('Email sent to scott365888@gmail.com')
          "

      - name: 上传生成内容
        uses: actions/upload-artifact@v4
        with:
          name: daily-content-${{ github.run_number }}
          path: output/
          retention-days: 30
