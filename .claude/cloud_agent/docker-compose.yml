version: '3.8'

services:
  cloud-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - SMTP_AUTH_CODE=${SMTP_AUTH_CODE}
      - API_SECRET_KEY=${API_SECRET_KEY:-cobm-secret-key-2026}
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 本地觸發器（可選）
  local-trigger:
    build: .
    command: python local_trigger.py
    environment:
      - CLOUD_API_URL=http://cloud-agent:8000
      - API_KEY=cobm-secret-key-2026
    depends_on:
      - cloud-agent
