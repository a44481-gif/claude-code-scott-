# GlobalOPS · Docker Compose
# 整合 n8n-ai 现有服务 + GlobalOPS 新增服务

version: "3.8"

services:
  # ============ n8n 主引擎 ============
  n8n:
    image: n8nio/n8n:1.60.0
    container_name: global_ops_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin123}
      - N8N_HOST=n8n.${DOMAIN:-localhost}
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=https://n8n.${DOMAIN:-localhost}/
      - N8N_LOG_LEVEL=info
      - N8N_DIAGNOSTICS_ENABLED=false
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - EXECUTIONS_DATA_TIMEOUT=300000
      # 数据库
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-global_ops}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-}
      # AI
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPL_API_KEY=${DEEPL_API_KEY:-}
      # 环境变量透传
      - GLOBAL_OPS_BASE=/data/global_ops
      - LARK_WEBHOOK=${LARK_WEBHOOK:-}
      - DOMAIN=${DOMAIN:-localhost}
      - ERROR_WORKFLOW_ID=${ERROR_WORKFLOW_ID:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n_workflows:/home/node/n8n/workflows
      - ./logs:/data/global_ops/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - global_ops_network

  # ============ PostgreSQL 数据库 ============
  postgres:
    image: postgres:15-alpine
    container_name: global_ops_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-global_ops}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - global_ops_network

  # ============ Redis 缓存 ============
  redis:
    image: redis:7-alpine
    container_name: global_ops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - global_ops_network

  # ============ Nginx 反向代理 ============
  nginx:
    image: nginx:alpine
    container_name: global_ops_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - n8n
    networks:
      - global_ops_network

  # ============ Watchtower 自动更新 ============
  watchtower:
    image: containrrr/watchtower
    container_name: global_ops_watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - global_ops_network

networks:
  global_ops_network:
    driver: bridge

volumes:
  n8n_data:
  postgres_data:
  redis_data:
